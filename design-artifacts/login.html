<html lang="de" data-theme="light"><head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Church Central</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: oklch(98.5% 0.011 85);
            --surface: oklch(100% 0 0);
            --ink: oklch(25% 0.03 240);
            --ink-2: oklch(60% 0.02 240);
            --ink-3: oklch(70% 0.02 240);
            --line: oklch(94% 0.01 240);
            --line-2: oklch(90% 0.01 240);
            --accent: oklch(49.56% 0.16 261.66);
            --accent-ink: oklch(100% 0 0);
            --accent-soft: oklch(95% 0.05 260);
            --gold: oklch(75.75% 0.11 85.84);
            --gold-darker: oklch(65% 0.1 86);
            --font-display: 'Lora', georgia, serif;
            --font-body: 'Inter', system-ui, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body, #root { width: 100%; height: 100%; overflow: hidden; }
        body {
            font-family: var(--font-body);
            background-color: var(--surface);
            color: var(--ink);
        }

        .split-screen-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
        }

        .image-panel {
            background-image: url('mqdrzduy-image.png');
            background-size: cover;
            background-position: center;
            animation: slideInFromBottom 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .form-panel {
            display: grid;
            place-items: center;
            padding: 24px;
            animation: slideInFromBottom 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 0.1s;
        }
        
        @keyframes slideInFromBottom {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-panel {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-panel h1 {
            font-family: var(--font-display);
            font-weight: 500;
            font-size: 2.25rem;
            color: var(--ink);
            margin-bottom: 8px;
        }
        .login-panel p {
            font-family: var(--font-display);
            font-style: italic;
            color: var(--ink-2);
            margin-bottom: 32px;
            max-width: 35ch;
            margin-left: auto;
            margin-right: auto;
        }
        .login-card {
            background-color: var(--surface);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--line);
        }
        .field-wrap {
            text-align: left;
            margin-bottom: 16px;
        }
        .field-wrap label {
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-2);
            margin-bottom: 8px;
            display: block;
        }
        .field-wrap input {
            font-family: var(--font-body);
            font-size: 15px;
            padding: 12px 14px;
            border: 1px solid var(--line-2);
            border-radius: 12px;
            background-color: var(--bg);
            color: var(--ink);
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field-wrap input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            font-size: 15px;
            border-radius: 12px;
            padding: 12px 18px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        .btn:active {
            transform: translateY(1px);
        }

        .btn-primary {
            background-color: var(--ink);
            color: var(--surface);
            border: 1px solid var(--ink);
        }
        .btn-primary:hover {
            background-color: var(--gold);
            color: var(--ink);
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--ink-3);
            font-size: 13px;
            font-weight: 500;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--line-2);
        }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .btn-google {
            background-color: var(--surface);
            color: var(--ink);
            border: 1px solid var(--line);
            font-weight: 500;
        }
        .btn-google:hover {
            background-color: var(--bg);
            border-color: var(--line-2);
        }
        .btn-google svg {
            width: 18px;
            height: 18px;
        }

        .login-footer {
            margin-top: 24px;
            font-size: 13px;
        }
        .login-footer a {
            color: var(--accent);
            font-weight: 500;
            text-decoration: none;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 1024px) {
            .split-screen-container {
                grid-template-columns: 1fr;
            }
            .image-panel {
                display: none;
            }
            .form-panel {
                background-color: var(--bg);
            }
        }
    </style>
</head>
<body>
    <div class="split-screen-container">
        <div class="image-panel"></div>
        <div class="form-panel">
            <div class="login-panel">
                <h1>Welcome to Church Central</h1>
                <p>"For where two or three are gathered in my name, there am I among them."</p>
                <div class="login-card">
                    <form>
                        <div class="field-wrap">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required="">
                        </div>
                        <div class="field-wrap">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required="">
                        </div>
                        <button type="submit" class="btn btn-primary">Sign In</button>
                        <div class="divider">
                            <span>or</span>
                        </div>
                        <button type="button" class="btn btn-google">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="24px" height="24px">
                                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"></path>
                                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                                <path fill="none" d="M0 0h48v48H0z"></path>
                            </svg>
                            <span>Sign in with Google</span>
                        </button>
                    </form>
                    <div class="login-footer">
                        <a href="#">Forgot Password?</a>
                    </div>
                </div>
                <div class="login-footer" style="padding-bottom: 0px; margin-top: 24px;">
                    Don't have an account? <a href="#">Sign Up</a>
                </div>
            </div>
        </div>
    </div>


</body></html>
