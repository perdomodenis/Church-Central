query ListProgramBlocks @auth(level: USER) {
  programBlocks(orderBy: [{ date: ASC }, { time: ASC }]) {
    id
    date
    time
    title
    minister
  }
}

query ListReusableBlocks @auth(level: USER) {
  reusableBlocks(orderBy: [{ title: ASC }]) {
