query GetUserContext($uid: String!) @auth(level: USER) {
  user(key: { uid: $uid }) {
    uid
    court
    courts
    dept
    depts
    district
    gender
    schoolClass
    position
    authorizedPostAsChurch
    authorizedPostAsDept
    authorizedPostAsCourt
    authorizedCreateProgram
  }
}

query GetUserProfile($uid: String!) @auth(level: USER) {
  user(key: { uid: $uid }) {
    uid
    email
    first
    last
    zip
    city
    court
    courts
    dept
    depts
    district
    gender
    schoolClass
    position
    bio
    profilePhoto
    joined
    lastActive
    status
    recentActivity
    interests
    pa {
      uid
      first
      last
    }
    authorizedPostAsChurch
    authorizedPostAsDept
    authorizedPostAsCourt
    authorizedCreateProgram
  }
}

query ListMembers @auth(level: USER) {
  users(orderBy: [{ first: ASC }]) {
    uid
    email
    first
    last
    zip
    city
    court
    courts
    dept
    depts
    district
    gender
    schoolClass
    position
    bio
    profilePhoto
    joined
    lastActive
    status
    recentActivity
    interests
    pa {
      uid
      first
      last
    }
    authorizedPostAsChurch
    authorizedPostAsDept
    authorizedPostAsCourt
    authorizedCreateProgram
  }
}

query SearchMembers($query: String!) @auth(level: USER) {
  users(
    where: {
      _or: [
        { first: { contains: $query } },
        { last: { contains: $query } },
        { dept: { contains: $query } }
      ]
    }
  ) {
    uid
    email
    first
    last
    zip
    city
    court
    courts
    dept
    depts
    district
    gender
    schoolClass
    position
    bio
    profilePhoto
    joined
    lastActive
    status
    recentActivity
    interests
    pa {
      uid
      first
      last
    }
    authorizedPostAsChurch
    authorizedPostAsDept
    authorizedPostAsCourt
    authorizedCreateProgram
  }
}

query ListFeedPosts @auth(level: USER) {
  announcements(orderBy: [{ createdAt: DESC }]) {
    id
    content
    scope
    category
    imageUrl
    likes
    createdAt
    author {
      uid
      first
      last
      profilePhoto
      district
      court
    }
  }
}

query ListEvents @auth(level: USER) {
  events(orderBy: [{ date: ASC }]) {
    id
    title
    date
    time
    endTime
    location
    description
    type
    capacity
    registered
    createdAt
    createdBy {
      uid
      first
      last
    }
    eventRegistrations_on_event {
      user {
        uid
        first
        last
      }
    }
  }
}

query GetEventDetails($id: UUID!) @auth(level: USER) {
