query ListPendingAppointments @auth(level: USER) {
  appointmentRequests(where: { status: { eq: "pending" } }, orderBy: [{ createdAt: DESC }]) {
    id
    requester
    requesterEmail
    staff
    date1
    time1
    date2
    time2
    date3
    time3
    date
    time
    reason
    type
    status
    createdAt
    leader {
      uid
      first
      last
      profilePhoto
      position
    }
    pa {
      uid
      first
      last
    }
  }
}

