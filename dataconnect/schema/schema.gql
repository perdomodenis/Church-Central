type User @table(key: "uid") {
  uid: String!
  email: String! @unique
  first: String!
  last: String!
  zip: String
  city: String
  court: String
  courts: [String!]
  dept: String
  depts: [String!]
  district: String
  gender: String
  schoolClass: String
  position: String
  bio: String
  profilePhoto: String
  joined: String
  lastActive: String
  status: String
  recentActivity: String
  interests: [String!]
  pa: User
  authorizedPostAsChurch: Boolean @default(value: false)
  authorizedPostAsDept: Boolean @default(value: false)
  authorizedPostAsCourt: Boolean @default(value: false)
  authorizedCreateProgram: Boolean @default(value: false)
}

type ProgramBlock @table {
  id: UUID! @default(expr: "uuidV4()")
  date: String!
  time: String!
  title: String!
  minister: String!
  assignedBy: String
  createdAt: Timestamp! @default(expr: "request.time")
}

type ReusableBlock @table {
  id: UUID! @default(expr: "uuidV4()")
  title: String!
  minister: String!
  time: String!
  assignedBy: String
  createdAt: Timestamp! @default(expr: "request.time")
}

type Event @table {
  id: UUID! @default(expr: "uuidV4()")
  title: String!
  date: String!
  time: String!
  endTime: String!
  location: String!
  description: String!
  type: String!
  capacity: Int!
  registered: Int! @default(value: 0)
  createdBy: User!
  assignedBy: String
  createdAt: Timestamp! @default(expr: "request.time")
}

type Announcement @table {
  id: UUID! @default(expr: "uuidV4()")
  author: User!
  content: String!
  scope: String!
  category: String!
  imageUrl: String
  likes: Int! @default(value: 0)
  assignedBy: String
  createdAt: Timestamp! @default(expr: "request.time")
}

type BaptismEvent @table {
  id: UUID! @default(expr: "uuidV4()")
  title: String!
  date: String!
  time: String!
  location: String!
  description: String!
  capacity: Int!
  registeredCount: Int! @default(value: 0)
  createdBy: User!
  assignedBy: String
  createdAt: Timestamp! @default(expr: "request.time")
}

type EventRegistration @table(key: ["event", "user"]) {
  event: Event!
  user: User!
  registeredAt: Timestamp! @default(expr: "request.time")
}

type BaptismRegistration @table(key: ["baptismEvent", "user"]) {
  baptismEvent: BaptismEvent!
  user: User!
  registeredAt: Timestamp! @default(expr: "request.time")
}

type AppointmentRequest @table {
  id: UUID! @default(expr: "uuidV4()")
  requester: String!
  requesterEmail: String!
  staff: String!
  leader: User
  pa: User
  date1: String!
  time1: String!
  date2: String!
  time2: String!
  date3: String!
  time3: String!
  date: String
  time: String
  reason: String!
  type: String!
  status: String! @default(value: "pending")
  createdAt: Timestamp! @default(expr: "request.time")
  
  # Approval/Rejection fields
  approvedBy: String
  rejectedBy: String
  rejectionReason: String
  decidedAt: Timestamp
  selectedSlot: Int
}


type PersonalProgramBlock @table {
  id: UUID! @default(expr: "uuidV4()")
  user: User!
  date: String!
  time: String!
  endTime: String
  title: String!
  description: String
  location: String
  category: String
  type: String
  hours: Float
  dressCode: String
  assignedBy: String
  createdAt: Timestamp! @default(expr: "request.time")
}

type PersonalReusableBlock @table {
  id: UUID! @default(expr: "uuidV4()")
  user: User!
  title: String!
  description: String
  time: String!
  endTime: String
  location: String
  category: String
  type: String
  hours: Float
  dressCode: String
  assignedBy: String
  createdAt: Timestamp! @default(expr: "request.time")
}
